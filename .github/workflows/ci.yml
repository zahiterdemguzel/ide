name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Lint + tests cover only the pure, Electron-free logic, so skip every
      # package's install scripts — no Electron binary download, no node-pty
      # native prebuild fetch. ESLint and node:test are plain JS and need neither.
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm test
