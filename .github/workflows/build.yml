name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            build: npm run build
            artifact: dist/*.exe
          - os: macos-latest
            name: macos
            build: npm run build:mac
            artifact: dist/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # package-lock.json is gitignored, so there's no lockfile in the repo:
      # `cache: npm` and `npm ci` both require one. Use a plain install instead.
      - run: npm install
      - run: ${{ matrix.build }}
        env:
          # Don't try to sign/notarize — no certs in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # Releases attach to a tag; cut one only for real pushes, not dry-run dispatch.
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      # One rolling "latest" release, refreshed on every push to master, so the
      # newest Windows .exe and macOS .dmg are always one click from the repo page.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: >-
            Automated build from the latest commit on `master`
            (${{ github.sha }}). Unsigned — see docs/platform-notes.md.
          prerelease: true
          files: artifacts/**/*
