<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; media-src 'self' data:" />
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="node_modules/@highlightjs/cdn-assets/styles/vs2015.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <title>Claude Sessions</title>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sessions-pane">
        <div class="pane-head">SESSIONS</div>
        <ul id="session-list"></ul>
        <div class="sidebar-actions">
          <button id="new-session">+ New session</button>
          <button id="open-folder">Open folder</button>
        </div>
      </div>
      <div id="gutter-sess" class="gutter gutter-row" title="Drag to resize"></div>
      <div id="files-pane">
        <div class="pane-head">
          EXPLORER <button id="files-refresh" title="Refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg></button>
        </div>
        <div id="file-tree"></div>
      </div>
      <div id="repo-label" class="repo-label"></div>
    </aside>

    <div id="gutter-left" class="gutter gutter-col" title="Drag to resize"></div>

    <main id="center">
      <div id="session-bar">
        <span id="session-title"></span>
        <div class="bar-right">
          <span id="session-commit-msg" class="git-msg"></span>
          <button id="session-commit">Commit changes</button>
        </div>
      </div>
      <div id="center-body">
        <div id="terminal-host"></div>
        <div id="empty-hint">No session selected. Click <b>+ New session</b>.</div>
        <div id="diff-view">
          <div id="diff-head">
            <span id="diff-file"></span>
            <button id="diff-close" title="Close diff">×</button>
          </div>
          <div id="diff-body"></div>
        </div>
        <div id="asset-view">
          <div id="asset-head">
            <span id="asset-file"></span>
            <div id="asset-tools"></div>
            <button id="asset-close" title="Close">×</button>
          </div>
          <div id="asset-body"></div>
        </div>
        <div id="web-view">
          <div id="web-head">
            <button id="web-back" class="web-nav" title="Back">‹</button>
            <button id="web-fwd" class="web-nav" title="Forward">›</button>
            <button id="web-reload" class="web-nav" title="Reload">⟳</button>
            <span id="web-url"></span>
            <button id="web-external" class="web-nav" title="Open in system browser">↗</button>
            <button id="web-close" title="Close">×</button>
          </div>
          <webview id="web-frame" src="about:blank"></webview>
        </div>
      </div>
    </main>

    <div id="gutter-right" class="gutter gutter-col" title="Drag to resize"></div>

    <aside id="git">
      <div class="pane-head">
        GIT <button id="git-refresh" title="Refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg></button>
      </div>
      <div class="git-section-title">Staged</div>
      <ul id="staged-list" class="git-list"></ul>
      <div class="git-section-title git-head-row">
        <span>Changes</span>
        <span class="git-head-actions">
          <button id="revert-all" class="git-btn git-revert" title="Discard all changes"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
          <button id="stage-all" class="git-btn" title="Stage all changes">+</button>
        </span>
      </div>
      <ul id="unstaged-list" class="git-list"></ul>
      <div class="git-commit">
        <textarea id="commit-msg" rows="2" placeholder="Commit message"></textarea>
        <div class="git-commit-actions">
          <button id="git-commit">Commit</button>
          <button id="git-undo" title="Undo last commit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5 5.5 5.5 0 0 1-5.5 5.5H11"/></svg> Undo</button>
          <button id="git-push">Push</button>
        </div>
        <div id="git-msg" class="git-msg"></div>
      </div>
    </aside>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="node_modules/@highlightjs/cdn-assets/highlight.min.js"></script>
  <!-- dos (cmd/bat) and powershell aren't in the common bundle; self-register onto hljs -->
  <script src="node_modules/@highlightjs/cdn-assets/languages/dos.min.js"></script>
  <script src="node_modules/@highlightjs/cdn-assets/languages/powershell.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
