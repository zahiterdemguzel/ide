<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
  <title>Claude Sessions</title>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="pane-head">SESSIONS</div>
      <ul id="session-list"></ul>
      <div class="sidebar-actions">
        <button id="new-session">+ New session</button>
        <button id="open-folder">Open folder</button>
      </div>
      <div id="repo-label" class="repo-label"></div>
    </aside>

    <main id="center">
      <div id="terminal-host"></div>
      <div id="empty-hint">No session selected. Click <b>+ New session</b>.</div>
    </main>

    <aside id="git">
      <div class="pane-head">
        GIT <button id="git-refresh" title="Refresh">⟳</button>
      </div>
      <div class="git-section-title">Staged</div>
      <ul id="staged-list" class="git-list"></ul>
      <div class="git-section-title">Changes</div>
      <ul id="unstaged-list" class="git-list"></ul>
      <div class="git-commit">
        <textarea id="commit-msg" rows="2" placeholder="Commit message"></textarea>
        <div class="git-commit-actions">
          <button id="git-commit">Commit</button>
          <button id="git-push">Push</button>
        </div>
        <div id="git-msg" class="git-msg"></div>
      </div>
    </aside>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
