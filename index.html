<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; media-src 'self' data:" />
  <link rel="icon" href="assets/icon.png" />
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="node_modules/@highlightjs/cdn-assets/styles/vs2015.min.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/toolbar.css" />
  <link rel="stylesheet" href="src/styles/layout.css" />
  <link rel="stylesheet" href="src/styles/sessions.css" />
  <link rel="stylesheet" href="src/styles/explorer.css" />
  <link rel="stylesheet" href="src/styles/diff.css" />
  <link rel="stylesheet" href="src/styles/asset.css" />
  <link rel="stylesheet" href="src/styles/web.css" />
  <link rel="stylesheet" href="src/styles/git.css" />
  <link rel="stylesheet" href="src/styles/console.css" />
  <link rel="stylesheet" href="src/styles/themes.css" />
  <link rel="stylesheet" href="src/styles/settings.css" />
  <title>IDE</title>
</head>
<body>
  <div id="toolbar" title="Launch configs and tasks from .vscode — click to open an external terminal">
    <div id="toolbar-runs"></div>
    <button id="browser-btn" data-i18n-title="browser.open" title="Browser"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg></button>
    <button id="settings-btn" data-i18n-title="settings.open" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
  </div>
  <div id="app">
    <aside id="sidebar">
      <div id="sessions-pane">
        <div class="pane-head" data-i18n="nav.sessions">SESSIONS</div>
        <div id="session-tabs" class="sess-tabs">
          <button class="sess-tab active" data-tab="active" data-i18n="sessions.tab.active">Active</button>
          <button class="sess-tab" data-tab="archived" data-i18n="sessions.tab.archived">Archived</button>
          <button class="sess-tab" data-tab="all" data-i18n="sessions.tab.all">All</button>
        </div>
        <ul id="session-list"></ul>
        <div class="sidebar-actions">
          <button id="new-session"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg><span data-i18n="sessions.new">New session</span></button>
        </div>
      </div>
      <div id="gutter-sess" class="gutter gutter-row" title="Drag to resize"></div>
      <div id="files-pane">
        <div class="pane-head">
          <span class="pane-head-left" data-i18n="nav.explorer">EXPLORER</span>
          <span class="pane-head-actions">
            <button id="files-new" data-i18n-title="explorer.newFile" title="New file"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
            <button id="files-new-folder" data-i18n-title="explorer.newFolder" title="New folder"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/><path d="M12 10v6"/><path d="M9 13h6"/></svg></button>
            <button id="files-collapse" data-i18n-title="explorer.collapseAll" title="Collapse all"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg></button>
            <button id="files-refresh" data-i18n-title="explorer.refresh" title="Refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg></button>
          </span>
        </div>
        <input id="file-search" type="search" data-i18n-placeholder="explorer.search" placeholder="Search files…" />
        <div id="file-tree"></div>
        <div id="search-results" hidden></div>
        <div class="sidebar-actions">
          <div class="open-folder-wrap">
            <div id="recent-folders-menu" class="recent-menu" hidden></div>
            <button id="open-folder" aria-haspopup="listbox" aria-expanded="false"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg><span data-i18n="explorer.openFolder">Open folder</span></button>
          </div>
        </div>
      </div>
    </aside>

    <div id="gutter-left" class="gutter gutter-col" title="Drag to resize"></div>

    <main id="center">
      <div id="session-bar">
        <span id="session-title"></span>
        <div class="bar-right">
          <span id="session-commit-msg" class="git-msg"></span>
          <button id="session-revert" data-i18n-title="session.revertTitle" data-i18n="session.revert" title="Revert only this session's changes">Revert</button>
          <button id="session-commit" disabled>Nothing to commit</button>
        </div>
      </div>
      <div id="center-body">
        <div id="terminal-host"></div>
        <div id="empty-hint" data-i18n-html="session.emptyHint">No session selected. Click <b>+ New session</b>.</div>
        <div id="diff-view">
          <div id="diff-head">
            <span id="diff-file"></span>
            <div id="diff-actions">
              <button id="diff-save" title="Save (Ctrl+S)" hidden>Save</button>
              <button id="diff-close" title="Close">×</button>
            </div>
          </div>
          <div id="diff-body"></div>
        </div>
        <div id="asset-view">
          <div id="asset-head">
            <span id="asset-file"></span>
            <div id="asset-tools"></div>
            <button id="asset-close" title="Close">×</button>
          </div>
          <div id="asset-body"></div>
        </div>
        <div id="web-view">
          <div id="web-head">
            <button id="web-back" class="web-nav" title="Back">‹</button>
            <button id="web-fwd" class="web-nav" title="Forward">›</button>
            <button id="web-reload" class="web-nav" title="Reload">⟳</button>
            <div id="web-addr">
              <input id="web-url" type="text" spellcheck="false" placeholder="Enter address" autocomplete="off" />
              <ul id="web-suggest"></ul>
            </div>
            <button id="web-external" class="web-nav" title="Open in system browser">↗</button>
            <div id="web-menu-wrap">
              <button id="web-menu" class="web-nav" title="More">⋮</button>
              <div id="web-menu-dropdown">
                <button id="web-reset-cookies">Reset cookies</button>
              </div>
            </div>
            <button id="web-terminate" class="web-nav" data-i18n-title="browser.terminate" title="Terminate browser">⏻</button>
            <button id="web-close" data-i18n-title="browser.close" title="Close">×</button>
          </div>
          <webview id="web-frame" src="about:blank" partition="persist:browser"></webview>
        </div>
      </div>
    </main>

    <div id="gutter-right" class="gutter gutter-col" title="Drag to resize"></div>

    <aside id="git">
      <div id="git-main">
      <div class="pane-head">
        <span class="pane-head-left"><span data-i18n="nav.git">GIT</span> <button id="git-branch" data-i18n-title="git.switchBranch" title="Switch branch"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg><span id="git-branch-name"></span></button></span>
        <span class="pane-head-right">
          <button id="git-fetch" data-i18n-title="git.fetch" title="Fetch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></svg></button>
          <button id="git-pull" data-i18n-title="git.pull" title="Pull"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg><span id="git-behind" class="git-behind-badge" hidden></span></button>
        </span>
      </div>
      <div id="branch-menu" class="branch-menu" hidden>
        <input id="branch-search" type="text" data-i18n-placeholder="git.searchBranches" placeholder="Search or create branch…" autocomplete="off" spellcheck="false">
        <ul id="branch-list" class="branch-list"></ul>
        <div id="branch-empty" class="branch-empty" data-i18n="git.noBranches" hidden>No branches</div>
      </div>
      <div id="git-tabs" class="git-tabs">
        <button class="git-tab active" data-tab="changes" data-i18n="git.tab.changes">Changes</button>
        <button class="git-tab" data-tab="history" data-i18n="git.tab.history">History</button>
      </div>
      <div id="git-changes-view">
      <div id="conflicts-section" hidden>
        <div class="git-section-title git-conflicts-title" data-i18n="git.conflicts">Conflicts</div>
        <ul id="conflicts-list" class="git-list"></ul>
      </div>
      <div class="git-section-title git-head-row">
        <span data-i18n="git.staged">Staged</span>
        <span class="git-head-actions">
          <button id="unstage-all" class="git-btn" data-i18n-title="git.unstageAll" title="Unstage all changes">−</button>
        </span>
      </div>
      <ul id="staged-list" class="git-list"></ul>
      <div class="git-section-title git-head-row">
        <span data-i18n="git.changes">Changes</span>
        <span class="git-head-actions">
          <button id="revert-all" class="git-btn git-revert" data-i18n-title="git.discardAll" title="Discard all changes"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
          <button id="stage-all" class="git-btn" data-i18n-title="git.stageAll" title="Stage all changes">+</button>
        </span>
      </div>
      <ul id="unstaged-list" class="git-list"></ul>
      <div class="git-commit">
        <div class="commit-msg-wrap"><textarea id="commit-msg" rows="2" data-i18n-placeholder="git.commitPlaceholder" placeholder="Commit message"></textarea><div id="commit-msg-grip" title="Drag to resize"></div></div>
        <div class="git-commit-actions">
          <button id="git-commit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M3 12h6"/><path d="M15 12h6"/></svg> <span data-i18n="git.commit">Commit</span></button>
          <button id="git-undo" data-i18n-title="git.undoTitle" title="Undo last commit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5 5.5 5.5 0 0 1-5.5 5.5H11"/></svg> <span data-i18n="git.undo">Undo</span></button>
          <button id="git-push"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg> <span data-i18n="git.push">Push</span><span id="git-ahead" class="git-ahead-badge" hidden></span></button>
        </div>
      </div>
      </div>
      <div id="git-history-view" hidden>
        <ul id="history-list" class="git-list"></ul>
      </div>
      </div>

      <div id="gutter-console" class="gutter gutter-row" title="Drag to resize"></div>

      <div id="git-console">
        <div class="pane-head" id="console-title" data-i18n="nav.terminal">TERMINAL</div>
        <div id="console-head">
          <div id="term-tabs"></div>
          <div id="term-tools">
            <button id="term-add" data-i18n-title="terminal.new" title="New terminal">+</button>
            <button id="term-clear" data-i18n-title="terminal.clearTitle" data-i18n="terminal.clear" title="Clear terminal">Clear</button>
          </div>
        </div>
        <div id="console-hosts"></div>
      </div>
    </aside>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="node_modules/@highlightjs/cdn-assets/highlight.min.js"></script>
  <!-- dos (cmd/bat) and powershell aren't in the common bundle; self-register onto hljs -->
  <script src="node_modules/@highlightjs/cdn-assets/languages/dos.min.js"></script>
  <script src="node_modules/@highlightjs/cdn-assets/languages/powershell.min.js"></script>
  <script type="module" src="src/renderer/index.js"></script>
  <dialog id="git-error-dialog">
    <h3 id="git-error-title">Push failed</h3>
    <div id="git-error-msg"></div>
    <button id="git-error-ok">OK</button>
  </dialog>
  <dialog id="run-error-dialog">
    <h3>Can't run this config</h3>
    <div id="run-error-msg"></div>
    <button id="run-error-ok">OK</button>
  </dialog>
  <dialog id="settings-dialog">
    <div class="settings-head">
      <h3 data-i18n="settings.title">Settings</h3>
      <button id="settings-close" data-i18n-title="settings.close" title="Close">×</button>
    </div>
    <div class="settings-body">
      <label class="settings-row">
        <span data-i18n="settings.language">Language</span>
        <select id="settings-language"></select>
      </label>
      <label class="settings-row">
        <span data-i18n="settings.theme">Theme</span>
        <select id="settings-theme"></select>
      </label>
      <div class="settings-group">
        <div class="settings-group-title" data-i18n="settings.panels">Panels</div>
        <div class="panel-grid">
          <label class="panel-toggle">
            <span class="panel-toggle-label" data-i18n="settings.panel.explorer">Explorer</span>
            <input type="checkbox" id="settings-panel-explorer" class="switch-input" />
            <span class="switch-ui"></span>
          </label>
          <label class="panel-toggle">
            <span class="panel-toggle-label" data-i18n="settings.panel.git">Git</span>
            <input type="checkbox" id="settings-panel-git" class="switch-input" />
            <span class="switch-ui"></span>
          </label>
          <label class="panel-toggle">
            <span class="panel-toggle-label" data-i18n="settings.panel.terminal">Terminal</span>
            <input type="checkbox" id="settings-panel-terminal" class="switch-input" />
            <span class="switch-ui"></span>
          </label>
          <label class="panel-toggle">
            <span class="panel-toggle-label" data-i18n="settings.panel.launch">Launch configs</span>
            <input type="checkbox" id="settings-panel-launch" class="switch-input" />
            <span class="switch-ui"></span>
          </label>
          <label class="panel-toggle">
            <span class="panel-toggle-label" data-i18n="settings.panel.tasks">Tasks</span>
            <input type="checkbox" id="settings-panel-tasks" class="switch-input" />
            <span class="switch-ui"></span>
          </label>
          <label class="panel-toggle">
            <span class="panel-toggle-label" data-i18n="settings.panel.browser">Browser</span>
            <input type="checkbox" id="settings-panel-browser" class="switch-input" />
            <span class="switch-ui"></span>
          </label>
        </div>
      </div>
    </div>
    <div class="settings-actions">
      <button id="settings-done" class="settings-primary" data-i18n="settings.done">Done</button>
    </div>
  </dialog>
  <dialog id="confirm-dialog">
    <h3 id="confirm-title"></h3>
    <div id="confirm-msg"></div>
    <div class="confirm-actions">
      <button id="confirm-cancel" class="confirm-btn-secondary">Cancel</button>
      <button id="confirm-ok" class="confirm-btn-primary">Open</button>
    </div>
  </dialog>
</body>
</html>
