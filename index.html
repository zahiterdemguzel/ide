<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; media-src 'self' data:" />
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="node_modules/@highlightjs/cdn-assets/styles/vs2015.min.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/toolbar.css" />
  <link rel="stylesheet" href="src/styles/layout.css" />
  <link rel="stylesheet" href="src/styles/sessions.css" />
  <link rel="stylesheet" href="src/styles/explorer.css" />
  <link rel="stylesheet" href="src/styles/diff.css" />
  <link rel="stylesheet" href="src/styles/asset.css" />
  <link rel="stylesheet" href="src/styles/web.css" />
  <link rel="stylesheet" href="src/styles/git.css" />
  <link rel="stylesheet" href="src/styles/console.css" />
  <title>IDE</title>
</head>
<body>
  <div id="toolbar" title="Launch configs and tasks from .vscode — click to open an external terminal">
    <div id="toolbar-runs"></div>
  </div>
  <div id="app">
    <aside id="sidebar">
      <div id="sessions-pane">
        <div class="pane-head">SESSIONS</div>
        <ul id="session-list"></ul>
        <div class="sidebar-actions">
          <button id="new-session"><img class="btn-icon" src="assets/plus.svg" alt="" />New session</button>
        </div>
      </div>
      <div id="gutter-sess" class="gutter gutter-row" title="Drag to resize"></div>
      <div id="files-pane">
        <div class="pane-head">
          <span class="pane-head-left">EXPLORER</span>
          <span class="pane-head-actions">
            <button id="files-new" title="New file"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
            <button id="files-collapse" title="Collapse all"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg></button>
            <button id="files-refresh" title="Refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg></button>
          </span>
        </div>
        <input id="file-search" type="search" placeholder="Search files…" />
        <div id="file-tree"></div>
        <div id="search-results" hidden></div>
        <div class="sidebar-actions">
          <button id="open-folder"><img class="btn-icon" src="assets/folder.svg" alt="" />Open folder</button>
        </div>
      </div>
    </aside>

    <div id="gutter-left" class="gutter gutter-col" title="Drag to resize"></div>

    <main id="center">
      <div id="session-bar">
        <span id="session-title"></span>
        <div class="bar-right">
          <span id="session-commit-msg" class="git-msg"></span>
          <button id="session-revert" title="Revert only this session's changes">Revert</button>
          <button id="session-commit" disabled>Nothing to commit</button>
        </div>
      </div>
      <div id="center-body">
        <div id="terminal-host"></div>
        <div id="empty-hint">No session selected. Click <b>+ New session</b>.</div>
        <div id="diff-view">
          <div id="diff-head">
            <span id="diff-file"></span>
            <div id="diff-head-right">
              <button id="diff-edit" title="Edit file" hidden><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg></button>
              <button id="diff-save" title="Save (Ctrl+S)" hidden><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg> Save</button>
              <button id="diff-close" title="Close">×</button>
            </div>
          </div>
          <div id="diff-body"></div>
        </div>
        <div id="asset-view">
          <div id="asset-head">
            <span id="asset-file"></span>
            <div id="asset-tools"></div>
            <button id="asset-close" title="Close">×</button>
          </div>
          <div id="asset-body"></div>
        </div>
        <div id="web-view">
          <div id="web-head">
            <button id="web-back" class="web-nav" title="Back">‹</button>
            <button id="web-fwd" class="web-nav" title="Forward">›</button>
            <button id="web-reload" class="web-nav" title="Reload">⟳</button>
            <span id="web-url"></span>
            <button id="web-external" class="web-nav" title="Open in system browser">↗</button>
            <button id="web-close" title="Close">×</button>
          </div>
          <webview id="web-frame" src="about:blank"></webview>
        </div>
      </div>
    </main>

    <div id="gutter-right" class="gutter gutter-col" title="Drag to resize"></div>

    <aside id="git">
      <div id="git-main">
      <div class="pane-head">
        GIT <button id="git-refresh" title="Refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg></button>
      </div>
      <div class="git-section-title">Staged</div>
      <ul id="staged-list" class="git-list"></ul>
      <div class="git-section-title git-head-row">
        <span>Changes</span>
        <span class="git-head-actions">
          <button id="revert-all" class="git-btn git-revert" title="Discard all changes"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
          <button id="stage-all" class="git-btn" title="Stage all changes">+</button>
        </span>
      </div>
      <ul id="unstaged-list" class="git-list"></ul>
      <div class="git-commit">
        <div id="git-msg" class="git-msg"></div>
        <textarea id="commit-msg" rows="2" placeholder="Commit message"></textarea>
        <div class="git-commit-actions">
          <button id="git-commit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M3 12h6"/><path d="M15 12h6"/></svg> Commit</button>
          <button id="git-undo" title="Undo last commit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5 5.5 5.5 0 0 1-5.5 5.5H11"/></svg> Undo</button>
          <button id="git-push"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg> Push<span id="git-ahead" class="git-ahead-badge" hidden></span></button>
        </div>
      </div>
      </div>

      <div id="gutter-console" class="gutter gutter-row" title="Drag to resize"></div>

      <div id="git-console">
        <div class="pane-head" id="console-title">TERMINAL</div>
        <div id="console-head">
          <div id="term-tabs"></div>
          <div id="term-tools">
            <button id="term-clear" title="Clear terminal">Clear</button>
            <button id="term-add" title="New terminal">+</button>
          </div>
        </div>
        <div id="console-hosts"></div>
      </div>
    </aside>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="node_modules/@highlightjs/cdn-assets/highlight.min.js"></script>
  <!-- dos (cmd/bat) and powershell aren't in the common bundle; self-register onto hljs -->
  <script src="node_modules/@highlightjs/cdn-assets/languages/dos.min.js"></script>
  <script src="node_modules/@highlightjs/cdn-assets/languages/powershell.min.js"></script>
  <script type="module" src="src/renderer/index.js"></script>
  <dialog id="git-error-dialog">
    <h3>Push failed</h3>
    <div id="git-error-msg"></div>
    <button id="git-error-ok">OK</button>
  </dialog>
</body>
</html>
